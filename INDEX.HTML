<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLEX FABRIC | Professional Streetwear Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0a0a0a; color: #fff; scroll-behavior: smooth; }
        .logo-font { font-family: 'Syncopate', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .product-card:hover img { transform: scale(1.1); }
        .active-cat { color: #facc15; border-bottom: 2px solid #facc15; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 10px; }
    </style>
</head>
<body>

    <nav class="fixed w-full z-50 glass px-6 py-4 flex justify-between items-center">
        <div class="logo-font text-2xl tracking-tighter text-yellow-400 cursor-pointer" onclick="showCategory('all')">FLEX FABRIC</div>
        <div class="hidden md:flex space-x-8 text-xs font-bold uppercase tracking-widest">
            <button onclick="showCategory('all')" class="cat-link hover:text-yellow-400 transition">All</button>
            <button onclick="showCategory('shirt')" class="cat-link hover:text-yellow-400 transition">Shirts</button>
            <button onclick="showCategory('tees')" class="cat-link hover:text-yellow-400 transition">Tees</button>
            <button onclick="showCategory('jeans')" class="cat-link hover:text-yellow-400 transition">Jeans</button>
            <button onclick="showCategory('shoes')" class="cat-link hover:text-yellow-400 transition">Shoes</button>
        </div>
        <div class="flex items-center space-x-5">
            <div class="relative cursor-pointer" onclick="toggleCart()">
                <i data-lucide="shopping-bag" class="w-6 h-6"></i>
                <span id="cart-count" class="absolute -top-2 -right-2 bg-yellow-400 text-black text-[10px] font-bold px-1.5 rounded-full">0</span>
            </div>
        </div>
    </nav>

    <section class="relative h-[60vh] flex items-center justify-center overflow-hidden pt-20">
        <div class="absolute inset-0 bg-black/60 z-10"></div>
        <img src="https://images.unsplash.com/photo-1552664199-fd31f7431a55?q=80&w=1920" class="absolute inset-0 w-full h-full object-cover" alt="Hero">
        <div class="relative z-20 text-center">
            <h1 id="main-title" class="logo-font text-5xl md:text-7xl mb-4">THE COLLECTIVE</h1>
            <p class="text-gray-400 tracking-widest uppercase text-sm">Engineered for Gen Z Lifestyle</p>
        </div>
    </section>

    <section id="shop" class="py-16 px-6 max-w-7xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-10" id="product-grid">
            </div>
    </section>

    <div id="product-modal" class="fixed inset-0 z-[100] hidden items-center justify-center p-4 bg-black/95 backdrop-blur-md">
        <div class="glass max-w-4xl w-full grid md:grid-cols-2 overflow-hidden rounded-2xl relative">
            <button onclick="closeModal()" class="absolute top-4 right-4 text-white hover:text-yellow-400 z-10"><i data-lucide="x"></i></button>
            <div class="h-[350px] md:h-[500px]"><img id="modal-img" src="" class="w-full h-full object-cover"></div>
            <div class="p-10 flex flex-col justify-center">
                <h2 id="modal-title" class="logo-font text-3xl mb-2 text-yellow-400 uppercase">ITEM NAME</h2>
                <p id="modal-price" class="text-2xl font-bold mb-8">$0.00</p>
                <div class="mb-6">
                    <p class="text-[10px] uppercase tracking-widest text-gray-500 mb-4">Choose Size</p>
                    <div class="flex gap-2">
                        <button class="border border-zinc-700 px-4 py-2 text-sm hover:border-yellow-400 transition">S</button>
                        <button class="border border-yellow-400 bg-yellow-400 text-black px-4 py-2 text-sm font-bold">M</button>
                        <button class="border border-zinc-700 px-4 py-2 text-sm hover:border-yellow-400 transition">L</button>
                        <button class="border border-zinc-700 px-4 py-2 text-sm hover:border-yellow-400 transition">XL</button>
                    </div>
                </div>
                <button onclick="confirmToCart()" class="w-full bg-white text-black py-4 font-bold uppercase tracking-widest hover:bg-yellow-400 transition shadow-lg shadow-white/5">Add to Bag</button>
            </div>
        </div>
    </div>

    <div id="cart-sidebar" class="fixed right-0 top-0 h-full w-80 glass z-[60] p-6 translate-x-full transition-transform duration-500 border-l border-white/10">
        <div class="flex justify-between items-center mb-10">
            <h2 class="text-xl font-bold uppercase tracking-tighter">Your Bag</h2>
            <i data-lucide="x" class="cursor-pointer" onclick="toggleCart()"></i>
        </div>
        <div id="cart-items" class="space-y-6 mb-10 overflow-y-auto max-h-[60vh]"></div>
        <div class="border-t border-white/10 pt-6">
            <div class="flex justify-between mb-6 font-bold text-lg"><span>Total</span><span id="cart-total" class="text-yellow-400">$0.00</span></div>
            <button onclick="openPayment()" class="w-full bg-yellow-400 text-black py-4 font-bold uppercase hover:bg-white transition">Checkout Now</button>
        </div>
    </div>

    <div id="payment-modal" class="fixed inset-0 z-[110] hidden items-center justify-center p-4 bg-black/90">
        <div class="glass max-w-md w-full p-8 rounded-3xl border border-yellow-400/20 text-center">
            <div class="w-16 h-16 bg-yellow-400/10 rounded-full flex items-center justify-center mx-auto mb-6">
                <i data-lucide="credit-card" class="text-yellow-400"></i>
            </div>
            <h2 class="logo-font text-2xl mb-6">Secure Checkout</h2>
            <input type="text" placeholder="Card Number" class="w-full bg-zinc-900 border border-zinc-800 p-4 rounded-xl mb-4 focus:border-yellow-400 outline-none transition text-sm">
            <div class="flex gap-4 mb-6">
                <input type="text" placeholder="MM/YY" class="w-1/2 bg-zinc-900 border border-zinc-800 p-4 rounded-xl outline-none text-sm">
                <input type="text" placeholder="CVC" class="w-1/2 bg-zinc-900 border border-zinc-800 p-4 rounded-xl outline-none text-sm">
            </div>
            <button id="pay-btn" onclick="startLoading()" class="w-full bg-yellow-400 text-black font-bold py-4 rounded-xl uppercase tracking-widest">Pay & Complete Order</button>
            <button onclick="closePayment()" class="mt-4 text-zinc-500 text-xs uppercase tracking-widest hover:text-white transition">Go Back</button>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        let cart = [];
        let total = 0;
        let selectedProduct = {};

        // 1. DATABASE (10 items per category)
        const products = [
            { id: 1, name: 'Boxy Denim', price: 85, cat: 'jeans', img: 'https://images.unsplash.com/photo-1541099649105-f69ad21f3246?w=500' },
            { id: 2, name: 'Cyber Cargo', price: 70, cat: 'jeans', img: 'https://images.unsplash.com/photo-1517445312882-bc9910d016b7?w=500' },
            { id: 3, name: 'Vibe Flannel', price: 55, cat: 'shirt', img: 'https://images.unsplash.com/photo-1589310243389-96a5483213a8?w=500' },
            { id: 4, name: 'Club Shirt', price: 45, cat: 'shirt', img: 'https://images.unsplash.com/photo-1596755094514-f87e34085b2c?w=500' },
            { id: 5, name: 'Heavy Tee', price: 35, cat: 'tees', img: 'https://images.unsplash.com/photo-1521572163474-6864f9cf17ab?w=500' },
            { id: 6, name: 'Acid Wash', price: 38, cat: 'tees', img: 'https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?w=500' },
            { id: 7, name: 'Retro Runner', price: 120, cat: 'shoes', img: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=500' },
            { id: 8, name: 'Drip Highs', price: 150, cat: 'shoes', img: 'https://images.unsplash.com/photo-1549298916-b41d501d3772?w=500' },
            // Add more here to reach 10 per category...
        ];

        function showCategory(category) {
            const grid = document.getElementById('product-grid');
            const title = document.getElementById('main-title');
            grid.innerHTML = '';
            title.innerText = category === 'all' ? 'THE COLLECTIVE' : category.toUpperCase();

            const filtered = category === 'all' ? products : products.filter(p => p.cat === category);
            
            filtered.forEach(p => {
                grid.innerHTML += `
                    <div class="product-card group cursor-pointer" onclick="openProductModal('${p.name}', ${p.price}, '${p.img}')">
                        <div class="relative overflow-hidden aspect-[4/5] bg-zinc-900 mb-6 rounded-lg">
                            <img src="${p.img}" class="w-full h-full object-cover transition-transform duration-700">
                            <div class="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center">
                                <span class="bg-white text-black px-6 py-2 text-xs font-bold uppercase tracking-widest">View Details</span>
                            </div>
                        </div>
                        <h3 class="font-bold text-sm tracking-widest uppercase">${p.name}</h3>
                        <p class="text-yellow-400 font-bold mt-1 text-lg">$${p.price}.00</p>
                    </div>
                `;
            });
        }

        // MODAL LOGIC
        function openProductModal(name, price, img) {
            selectedProduct = { name, price };
            document.getElementById('modal-title').innerText = name;
            document.getElementById('modal-price').innerText = `$${price}.00`;
            document.getElementById('modal-img').src = img;
            document.getElementById('product-modal').classList.replace('hidden', 'flex');
        }

        function closeModal() {
            document.getElementById('product-modal').classList.replace('flex', 'hidden');
        }

        function confirmToCart() {
            cart.push(selectedProduct);
            total += selectedProduct.price;
            updateCartUI();
            closeModal();
            toggleCart();
        }

        // CART LOGIC
        function toggleCart() {
            document.getElementById('cart-sidebar').classList.toggle('translate-x-full');
        }

        function updateCartUI() {
            const container = document.getElementById('cart-items');
            document.getElementById('cart-count').innerText = cart.length;
            document.getElementById('cart-total').innerText = `$${total.toFixed(2)}`;
            container.innerHTML = cart.map((item, i) => `
                <div class="flex justify-between items-center animate-fade-in">
                    <div><p class="text-sm font-bold uppercase">${item.name}</p><p class="text-yellow-400 text-xs">$${item.price}</p></div>
                    <button onclick="removeFromCart(${i})" class="text-zinc-500 hover:text-white"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function removeFromCart(i) {
            total -= cart[i].price;
            cart.splice(i, 1);
            updateCartUI();
        }

        // PAYMENT LOGIC
        function openPayment() {
            if(cart.length === 0) return alert("Your bag is empty!");
            document.getElementById('payment-modal').classList.remove('hidden');
            document.getElementById('payment-modal').classList.add('flex');
        }

        function closePayment() {
            document.getElementById('payment-modal').classList.replace('flex', 'hidden');
        }

        function startLoading() {
            const btn = document.getElementById('pay-btn');
            btn.innerHTML = `<span class="flex items-center justify-center gap-2">Processing...</span>`;
            btn.classList.add('opacity-50', 'pointer-events-none');
            
            setTimeout(() => {
                btn.innerHTML = "Success! Redirecting...";
                btn.classList.replace('bg-yellow-400', 'bg-green-500');
                setTimeout(() => {
                    alert("Order Placed Successfully! Team Kaif & Parth will handle the rest.");
                    location.reload();
                }, 1500);
            }, 3000);
        }

        // Initialize
        showCategory('all');
    </script>
</body>
</html>
